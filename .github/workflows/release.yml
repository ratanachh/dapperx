name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore DapperX.slnx

      - name: Build
        run: dotnet build DapperX.slnx --no-restore -c Release

      - name: Test (compile-time unit + matrix, no Docker)
        run: dotnet test DapperX.slnx --no-build -c Release --filter "FullyQualifiedName!~IntegrationTests"

  publish:
    name: Pack, publish to NuGet, upload release assets
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Derive package version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore DapperX.slnx

      - name: Pack
        run: dotnet pack DapperX.slnx --no-restore -c Release -p:Version=${{ steps.version.outputs.value }} -o ./artifacts

      - name: Push to NuGet.org    
        run: |
          for f in ./artifacts/*.nupkg; do
            echo "PUSHING: $f"
            dotnet nuget push "$f" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Create GitHub Release with package assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
