services:
  mysql:
    image: mysql:8.4
    container_name: dapperx-sample-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "DapperX_Sample_P@ssw0rd"
      MYSQL_DATABASE: dapperx_sample
      MYSQL_USER: dapperx
      MYSQL_PASSWORD: "DapperX_Sample_P@ssw0rd"
    ports:
      - "3307:3306"
    volumes:
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
