services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dapperx-sample-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DapperX_Sample_P@ssw0rd"
    ports:
      - "14333:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
